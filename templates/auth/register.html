<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · quote•lounge</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f4f1fa 0%, #e8e0ff 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .auth-container {
            max-width: 500px;
            width: 100%;
        }

        .auth-card {
            background: white;
            border-radius: 48px;
            padding: 2.8rem 2.5rem;
            box-shadow: 0 30px 50px -20px rgba(41, 24, 78, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .logo-icon {
            background: #3c2e6b;
            color: white;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 10px 15px -8px #2d2252;
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 620;
            letter-spacing: -0.5px;
            color: #251e3d;
        }

        h2 {
            color: #2d244a;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            font-weight: 600;
        }

        .subtitle {
            color: #6a5e8a;
            margin-bottom: 2.2rem;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.3rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #3f3563;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-field {
            width: 100%;
            padding: 1rem 1.3rem;
            border: 2px solid #e3daf5;
            border-radius: 40px;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fcfaff;
        }

        .input-field:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        .input-field::placeholder {
            color: #a69fc0;
            font-weight: 300;
        }

        .password-hint {
            font-size: 0.8rem;
            color: #7a6d99;
            margin-top: 0.4rem;
            margin-left: 0.8rem;
        }

        .terms-row {
            margin: 1.8rem 0 1.8rem;
            display: flex;
            align-items: center;
            gap: 0.7rem;
        }

        .terms-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4f46e5;
            cursor: pointer;
        }

        .terms-row label {
            color: #4a3f6b;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .terms-row a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid #c5b8e8;
        }

        .register-btn {
            background: #3c2e6b;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 20px -8px #382e63;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .register-btn:hover {
            background: #2d2252;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px #2d2252;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2.2rem;
            color: #6a5e8a;
        }

        .auth-footer a {
            color: #3c2e6b;
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid #d8cef0;
            padding-bottom: 1px;
        }

        .auth-footer a:hover {
            color: #1f1740;
            border-bottom-color: #3c2e6b;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0 1.5rem;
            color: #8f82b3;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #e5dbf5;
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .social-login {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e3daf5;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #4a3f6b;
            font-size: 1.3rem;
        }

        .social-btn:hover {
            border-color: #4f46e5;
            color: #4f46e5;
            transform: scale(1.05);
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 0.9rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-message {
            background: #dcfce7;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 0.9rem 1.2rem;
            border-radius: 40px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 5px;
            background: #e3daf5;
            border-radius: 10px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            background: #dc2626;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-quote-left"></i></div>
                <h1>quote•lounge</h1>
            </div>

            <h2>Join the community</h2>
            <p class="subtitle">Start sharing and discovering amazing quotes</p>

            <!-- Example error message (hidden by default) -->
            <!-- <div class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                Please fix the errors below.
            </div> -->

            <form method="post" action="/register/">
                {% csrf_token %}
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="input-field" placeholder="Choose a username" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="input-field" placeholder="your@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="input-field" placeholder="Create a password" required>
                    <div class="password-strength">
                        <div class="strength-bar" style="width: 60%; background: #f59e0b;"></div>
                    </div>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Use at least 8 characters with letters & numbers
                    </div>
                </div>

                <div class="input-group">
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password" class="input-field" placeholder="Re-enter password" required>
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> Create account
                </button>
            </form>

            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-login">
                <button class="social-btn"><i class="fab fa-google"></i></button>
                <button class="social-btn"><i class="fab fa-github"></i></button>
                <button class="social-btn"><i class="fab fa-twitter"></i></button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="/login/">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        // Simple password strength indicator (just for demo)
        document.getElementById('password')?.addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.querySelector('.strength-bar');
            let strength = 0;
            
            if (password.length > 0) strength += 20;
            if (password.length >= 8) strength += 20;
            if (password.match(/[a-z]/)) strength += 20;
            if (password.match(/[A-Z]/)) strength += 20;
            if (password.match(/[0-9]/)) strength += 20;
            
            strengthBar.style.width = strength + '%';
            
            if (strength < 40) {
                strengthBar.style.background = '#dc2626';
            } else if (strength < 80) {
                strengthBar.style.background = '#f59e0b';
            } else {
                strengthBar.style.background = '#10b981';
            }
        });
    </script>
</body>
</html>
